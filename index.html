<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reestructuración Corporal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0b0e13;
  --surface:#13181f;
  --surface2:#1a2130;
  --surface3:#212b3a;
  --gold:#f0b840;
  --gold-dim:rgba(240,184,64,0.12);
  --blue:#5bb8ff;
  --blue-dim:rgba(91,184,255,0.1);
  --green:#3ecf7a;
  --green-dim:rgba(62,207,122,0.1);
  --red:#ff6b6b;
  --text:#e8edf4;
  --text-2:#8a97a8;
  --text-3:#4a5668;
  --border:rgba(255,255,255,0.06);
  --border-2:rgba(255,255,255,0.1);
  --radius:14px;
  --radius-sm:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(240,184,64,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(91,184,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}

/* ── HEADER ── */
.header{padding:14px 18px 0;position:sticky;top:0;background:rgba(11,14,19,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.5px;color:var(--text)}
.brand-sub{font-size:10px;font-weight:500;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}
.today-pill{background:var(--surface2);border:1px solid var(--border-2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:0.3px}

/* day strip */
.day-strip{display:flex;gap:6px;overflow-x:auto;padding:0 0 14px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all 0.2s;min-width:46px;position:relative}
.day-btn.active{background:var(--gold-dim);border-color:rgba(240,184,64,0.4)}
.day-btn .dn{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3)}
.day-btn.active .dn{color:var(--gold)}
.day-btn .dd{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;color:var(--text-2);line-height:1}
.day-btn.active .dd{color:var(--gold)}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--text-3);margin-top:1px;transition:all 0.2s}
.day-btn.has-dot .day-dot{background:var(--gold);opacity:0.6}
.day-btn.full-done .day-dot{background:var(--green);opacity:1}
.day-btn.active .day-dot{opacity:0}

/* ── CONTENT ── */
.content{padding:20px 18px 100px;position:relative;z-index:1}

/* ── DAY HERO ── */
.day-hero{margin-bottom:20px}
.day-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-dim);border:1px solid rgba(240,184,64,0.25);border-radius:20px;padding:4px 12px;margin-bottom:10px}
.day-tag-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.day-tag-txt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold)}
.day-big{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;letter-spacing:-0.5px;line-height:1;color:var(--text)}
.day-sub{color:var(--text-2);font-size:12px;margin-top:6px;font-weight:500}

/* ── COMP CARDS ── */
.comp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.comp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);transition:background 0.3s}
.comp-card.done{background:var(--green-dim);border-color:rgba(62,207,122,0.25)}
.comp-card.done::before{background:var(--green)}
.comp-card.gold-accent::before{background:var(--gold)}
.comp-card.auto-track{cursor:default}
.comp-emoji{font-size:22px;margin-bottom:8px;display:block}
.comp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);margin-bottom:4px}
.comp-card.done .comp-label{color:var(--green)}
.comp-pct{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--gold);line-height:1;margin-bottom:4px}
.comp-card.done .comp-pct{color:var(--green)}
.comp-hint{font-size:10px;color:var(--text-3);font-weight:500}
.comp-card.done .comp-hint{color:var(--green)}
.comp-check{position:absolute;top:12px;right:12px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;background:var(--surface2);transition:all 0.2s}
.comp-card.done .comp-check{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}

/* ── SESSION CARDS ── */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color 0.25s;animation:fadeUp 0.25s ease both}
.session-card.open{border-color:var(--border-2)}
.session-card.all-done{border-color:rgba(62,207,122,0.3)}
.sess-hdr{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.s-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border)}
.ic-gym{background:linear-gradient(135deg,rgba(240,184,64,0.12),rgba(240,184,64,0.04))}
.ic-run{background:linear-gradient(135deg,rgba(91,184,255,0.12),rgba(91,184,255,0.04))}
.s-inf{flex:1;min-width:0}
.s-type{font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:2px;letter-spacing:0.3px}
.s-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-badge{font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(240,184,64,0.2);padding:4px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.s-badge.ok{color:var(--green);background:var(--green-dim);border-color:rgba(62,207,122,0.2)}
.chevron{color:var(--text-3);transition:transform 0.3s;font-size:10px;flex-shrink:0}
.session-card.open .chevron{transform:rotate(180deg)}
.sess-body{max-height:0;overflow:hidden;transition:max-height 0.45s ease}
.session-card.open .sess-body{max-height:3000px}

/* progress bar */
.pbar-wrap{padding:10px 16px 8px;border-top:1px solid var(--border)}
.pbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);margin-bottom:6px;font-weight:600}
.pbar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ffd56b);border-radius:2px;transition:width 0.4s ease}
.pbar-fill.gfill{background:linear-gradient(90deg,var(--green),#7bf0a8)}

/* exercise list */
.ex-list{padding:4px 16px 14px}
.ex-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.18s}
.ex-item:last-child{border-bottom:none}
.ex-item.done{opacity:0.38}
.ex-chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.2s;background:var(--surface2)}
.ex-item.done .ex-chk{background:var(--gold);border-color:var(--gold);color:#000;font-weight:800}
.ex-det{flex:1;min-width:0}
.ex-nm{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.ex-mt{font-size:11px;color:var(--text-2);font-weight:400}
.ex-nt{font-size:10px;color:var(--gold);margin-top:2px;font-style:italic}
.ex-tag{font-size:8px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.6px;flex-shrink:0}
.tag-thor{background:rgba(240,184,64,0.12);color:var(--gold)}
.tag-postura{background:rgba(255,107,107,0.12);color:#ff8a8a}
.tag-correctivo{background:rgba(91,184,255,0.12);color:var(--blue)}
.tag-atletico{background:rgba(62,207,122,0.12);color:var(--green)}

/* ── REST CARD ── */
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center}
.rest-emoji{font-size:52px;margin-bottom:14px;display:block}
.rest-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:1px;color:var(--text-2);margin-bottom:8px}
.rest-txt{color:var(--text-3);font-size:12px;line-height:1.7;font-weight:500}

/* ── POSTURA ── */
.post-hero{background:var(--surface);border:1px solid rgba(91,184,255,0.15);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.post-badge{display:inline-flex;align-items:center;gap:7px;background:var(--blue-dim);border:1px solid rgba(91,184,255,0.2);border-radius:20px;padding:5px 12px;margin-bottom:12px}
.pb-dot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
.pb-txt{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase}
.post-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.2px;margin-bottom:5px}
.post-desc{font-size:11px;color:var(--text-2);line-height:1.65;font-weight:400}
.phase-pills{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.ph-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}
.ph-pill.done-ph{border-color:rgba(62,207,122,0.3);color:var(--green);background:var(--green-dim)}
.ph-block-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin:18px 0 8px;display:flex;align-items:center;gap:10px}
.ph-block-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* posture exercise cards */
.p-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border);overflow:hidden;animation:fadeUp 0.22s ease both;transition:border-color 0.2s}
.p-card.p-done{border-color:rgba(62,207,122,0.25);opacity:0.55}
.p-hdr{padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.p-chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.2s;background:var(--surface2)}
.p-card.p-done .p-chk{background:var(--green);border-color:var(--green);color:#fff;font-weight:800}
.p-inf{flex:1}
.p-nm{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text)}
.p-pm{font-size:10px;color:var(--text-2);font-weight:500}
.p-chev{color:var(--text-3);font-size:10px;transition:transform 0.3s;flex-shrink:0}
.p-card.p-open .p-chev{transform:rotate(180deg)}
.p-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.p-card.p-open .p-body{max-height:700px}
.p-detail{padding:0 15px 14px;border-top:1px solid var(--border)}
.p-why{background:var(--blue-dim);border-left:3px solid var(--blue);border-radius:0 7px 7px 0;padding:9px 12px;font-size:10px;color:rgba(91,184,255,0.85);line-height:1.6;margin:12px 0 10px;font-weight:500}
.p-why strong{color:var(--blue);font-weight:700}
.p-steps{list-style:none}
.p-steps li{display:flex;gap:10px;font-size:10px;line-height:1.6;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text-2);font-weight:400}
.p-steps li:last-child{border-bottom:none}
.p-sn{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:var(--blue);flex-shrink:0;width:13px;margin-top:1px}
.p-btns{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:5px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,184,255,0.2);border-radius:7px;padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s}
.tbtn:hover{background:rgba(91,184,255,0.15)}
.dbtn{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);color:var(--text-2);border:1px solid var(--border-2);border-radius:7px;padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all 0.2s}
.dbtn.is-done{background:var(--green-dim);color:var(--green);border-color:rgba(62,207,122,0.3)}

/* ── RESUMEN ── */
.res-header{margin-bottom:20px}
.res-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.3px;margin-bottom:3px}
.res-sub{font-size:11px;color:var(--text-3);font-weight:500}

.today-box{background:var(--surface);border:1px solid rgba(240,184,64,0.2);border-radius:var(--radius);padding:18px;margin-bottom:16px;position:relative;overflow:hidden}
.today-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),rgba(240,184,64,0.3))}
.today-box-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:14px}
.today-pct-row{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.today-pct-num{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-2px}
.today-pct-info{flex:1}
.today-pct-label{font-size:13px;color:var(--text);font-weight:600;margin-bottom:4px}
.today-pct-sub{font-size:10px;color:var(--text-2);font-weight:500;line-height:1.5}
.today-prog{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.today-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ffd56b);border-radius:2px;transition:width 0.5s ease}

.export-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--gold),#ffd56b);color:#0b0e13;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s}
.export-btn:active{opacity:0.85}
.export-note{font-size:10px;color:var(--text-3);text-align:center;margin-bottom:20px;font-weight:500}

.week-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-3);margin-bottom:10px}

.res-day-card{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border);overflow:hidden;transition:border-color 0.2s}
.res-day-card.r-open{border-color:var(--border-2)}
.res-day-hdr{padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.res-day-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;min-width:36px;color:var(--text-2)}
.res-day-num.today{color:var(--gold)}
.res-day-info{flex:1}
.res-day-name{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text)}
.res-day-sub{font-size:10px;color:var(--text-3);font-weight:400}
.res-day-pct{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;flex-shrink:0}
.res-day-chev{color:var(--text-3);font-size:10px;transition:transform 0.3s;flex-shrink:0}
.res-day-card.r-open .res-day-chev{transform:rotate(180deg)}
.res-day-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.res-day-card.r-open .res-day-body{max-height:400px}
.res-act-list{padding:4px 15px 13px;border-top:1px solid var(--border)}
.res-act{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}
.res-act:last-child{border-bottom:none}
.res-act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-mob{background:var(--blue)}
.dot-gym{background:var(--gold)}
.dot-run{background:var(--green)}
.dot-rest{background:var(--text-3)}
.res-act-name{flex:1;color:var(--text-2);font-weight:400}
.res-act-ok{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--green)}
.res-act-pend{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3)}

/* ── TIMER OVERLAY ── */
.timer-ov{display:none;position:fixed;inset:0;background:rgba(11,14,19,0.97);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:0}
.timer-ov.show{display:flex}
.t-ring{width:180px;height:180px;position:relative;margin-bottom:20px}
.t-ring svg{transform:rotate(-90deg)}
.t-ring circle.bg{fill:none;stroke:var(--surface2);stroke-width:6}
.t-ring circle.prog{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.9s ease}
.t-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.t-disp{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;color:var(--text);letter-spacing:-2px}
.t-lbl{font-size:11px;color:var(--text-3);text-align:center;padding:0 32px;margin-bottom:28px;font-weight:500;line-height:1.5}
.t-ctrl{display:flex;gap:10px}
.t-btn{padding:13px 28px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.5px;border:none;cursor:pointer;transition:opacity 0.2s}
.t-btn.pri{background:var(--gold);color:#0b0e13}
.t-btn.sec{background:var(--surface);color:var(--text-2);border:1px solid var(--border-2)}
.t-btn:active{opacity:0.8}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,14,19,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:10px 6px 26px;display:flex;justify-content:space-around;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text-3);transition:color 0.2s;padding:5px 14px;border-radius:9px}
.nav-btn.active{color:var(--gold)}
.nav-btn .ni{font-size:20px;line-height:1}
.nav-btn .nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:'Syne',sans-serif}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- TIMER OVERLAY -->
<div class="timer-ov" id="timerOv">
  <div class="t-ring">
    <svg viewBox="0 0 180 180" width="180" height="180">
      <circle class="bg" cx="90" cy="90" r="82"/>
      <circle class="prog" id="tCircle" cx="90" cy="90" r="82" stroke-dasharray="515" stroke-dashoffset="0"/>
    </svg>
    <div class="t-inner"><div class="t-disp" id="tDisp">1:00</div></div>
  </div>
  <div class="t-lbl" id="tLbl">—</div>
  <div class="t-ctrl">
    <button class="t-btn pri" id="tToggle" onclick="toggleTimer()">INICIAR</button>
    <button class="t-btn sec" onclick="closeTimer()">CERRAR</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-name">REESTRUCTURACIÓN CORPORAL</div>
      <div class="brand-sub">Protocolo integral · Thor Mode</div>
    </div>
    <div class="today-pill" id="todayDate"></div>

// ── ASIGNACIÓN SESIONES POSTURA ──
// A: Lun(1), Mar(2), Vie(5)
// B: Mié(3), Jue(4), Sáb(6)
// Dom(0): descanso
function postSessKey(d){
  if(d===0) return null;
  return [1,4,6].includes(d) ? 'A' : 'B';
}

// ── STATE ──
let curDay = new Date().getDay();
let gd={}, pd={}, md={};
let timerInterval=null, timerSecs=0, timerTotal=0, timerRunning=false;
try{gd=JSON.parse(sessionStorage.getItem('gd')||'{}')}catch(e){}
try{pd=JSON.parse(sessionStorage.getItem('pd')||'{}')}catch(e){}
try{md=JSON.parse(sessionStorage.getItem('md')||'{}')}catch(e){}
const sg=()=>{try{sessionStorage.setItem('gd',JSON.stringify(gd))}catch(e){}};
const sp=()=>{try{sessionStorage.setItem('pd',JSON.stringify(pd))}catch(e){}};
const sm=()=>{try{sessionStorage.setItem('md',JSON.stringify(md))}catch(e){}};

function mobKey(d){return 'm'+d+'_'+new Date().toDateString()}

// ── PCT CALCULATIONS ──
function gymPct(d){
  const data=GYM[d];
  if(!data) return 0;
  const all=data.sessions.flatMap(s=>s.ex);
  return all.length ? Math.round(all.filter(e=>gd[e.n]).length/all.length*100) : 0;
}
function postPct(d){
  const sk=postSessKey(d);
  if(!sk) return 0;
  const all=POST[sk].phases.flatMap(p=>p.ex);
  return all.length ? Math.round(all.filter(e=>pd[e.id]).length/all.length*100) : 0;
}
function mobDone(d){return !!md[mobKey(d)]}
// totalPct: promedio entre gym y movilidad (movilidad = 100 si marcada, sino postPct real)
function totalPct(d){
  const gp=gymPct(d);
  const mp=mobDone(d)?100:postPct(d);
  if(!GYM[d]) return mp; // día sin gym, solo movilidad (domingo = 0)
  return Math.round((gp+mp)/2);
}

// ── INIT ──
function init(){
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  buildDays();
  renderDay(curDay);
}

function buildDays(){
  const cont=document.getElementById('daySelector');
  cont.innerHTML='';
  const today=new Date().getDay();
  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    const tp=totalPct(d);
    const btn=document.createElement('div');
    btn.className=`day-btn${d===curDay?' active':''} has-dot${tp>=100?' full-done':''}`;
    btn.dataset.day=d;
    btn.innerHTML=`<span class="dn">${DS[d]}</span><span class="dd">${dt.getDate()}</span><div class="day-dot"></div>`;
    btn.onclick=()=>selDay(d);
    cont.appendChild(btn);
  }
}

function selDay(d){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.day)===d));
  renderDay(d);
  if(document.getElementById('view-postura').classList.contains('active')) renderPostura(d);
  if(document.getElementById('view-resumen').classList.contains('active')) renderResumen();
}

// ── GYM VIEW ──
function renderDay(d){
  const data=GYM[d];
  document.getElementById('dayBig').textContent=DN[d];
  if(!data){
    document.getElementById('dayLbl').textContent='Descanso';
    document.getElementById('daySub').textContent='Recuperación activa';
    document.getElementById('compRow').innerHTML='';
    document.getElementById('gymContent').innerHTML=`<div class="rest-card"><span class="rest-emoji">😴</span><div class="rest-title">DESCANSO TOTAL</div><div class="rest-txt">El músculo crece mientras descansás.<br>Hidratate · 8 horas de sueño · proteína.</div></div>`;
    return;
  }
  document.getElementById('dayLbl').textContent=data.label;
  document.getElementById('daySub').textContent=`${data.sessions.length} sesión${data.sessions.length>1?'es':''} · ⚡ Thor Mode`;
  renderComp(d,data);
  renderSessions(d,data);
}

function renderComp(d,data){
  const gp=gymPct(d);
  const mok=mobDone(d);
  const pp=postPct(d);
  const row=document.getElementById('compRow');
  row.innerHTML='';

  // Movilidad card
  const m=document.createElement('div');
  m.className=`comp-card${mok?' done':''}`;
  m.onclick=()=>toggleMob(d);
  m.innerHTML=`<div class="comp-check">${mok?'✓':''}</div><span class="comp-emoji">🧘</span><div class="comp-label">Movilidad</div><div class="comp-pct">${mok?'100':pp}%</div><div class="comp-hint">${mok?'✓ Completado':'Tocá para marcar'}</div>`;
  row.appendChild(m);

  // Gym card
  const ok=gp===100;
  const g=document.createElement('div');
  g.className=`comp-card auto-track${ok?' done':''}${gp>0&&!ok?' gold-accent':''}`;
  g.innerHTML=`<div class="comp-check">${ok?'✓':''}</div><span class="comp-emoji">🏋️</span><div class="comp-label">Gym</div><div class="comp-pct">${gp}%</div><div class="comp-hint">${ok?'✓ Completado':'Auto al terminar ejercicios'}</div>`;
  row.appendChild(g);
}

function toggleMob(d){
  md[mobKey(d)]=!md[mobKey(d)];
  sm();
  renderComp(d,GYM[d]);
  buildDays();
}

function renderSessions(d,data){
  const cont=document.getElementById('gymContent');
  cont.innerHTML='';
  data.sessions.forEach((sess,si)=>{
    const din=sess.ex.filter(e=>gd[e.n]).length;
    const pct=Math.round(din/sess.ex.length*100);
    const ok=din===sess.ex.length;
    const exHTML=sess.ex.map(ex=>{
      const done=!!gd[ex.n];
      const safe=ex.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="ex-item${done?' done':''}" onclick="toggleGym('${safe}',${d})">
        <div class="ex-chk">${done?'✓':''}</div>
        <div class="ex-det"><div class="ex-nm">${ex.n}</div><div class="ex-mt">${ex.m}</div>${ex.note?`<div class="ex-nt">${ex.note}</div>`:''}</div>
        <span class="ex-tag tag-${ex.t}">${TL[ex.t]||ex.t}</span>
      </div>`;
    }).join('');
    const card=document.createElement('div');
    card.className=`session-card${si===0?' open':''}${ok?' all-done':''}`;
    card.id='sc'+si;
    card.style.animationDelay=(si*0.06)+'s';
    card.innerHTML=`<div class="sess-hdr" onclick="togSess(${si})">
      <div class="s-ico ${sess.ic}">${sess.icon}</div>
      <div class="s-inf"><div class="s-type">${sess.type}</div><div class="s-name">${sess.name}</div></div>
      <span class="s-badge${ok?' ok':''}">${ok?'✓ Listo':din+'/'+sess.ex.length}</span>
      <span class="chevron">▼</span>
    </div>
    <div class="sess-body">
      <div class="pbar-wrap"><div class="pbar-lbl"><span>Progreso</span><span>${pct}%</span></div><div class="pbar"><div class="pbar-fill${ok?' gfill':''}" style="width:${pct}%"></div></div></div>
      <div class="ex-list">${exHTML}</div>
    </div>`;
    cont.appendChild(card);
  });
}

function togSess(i){document.getElementById('sc'+i).classList.toggle('open')}

function toggleGym(name,d){
  gd[name]=!gd[name];
  sg();
  renderComp(d,GYM[d]);
  renderSessions(d,GYM[d]);
  buildDays();
}

// ── POSTURA VIEW ──
function renderPostura(d){
  const sk=postSessKey(d);
  const cont=document.getElementById('postContent');
  cont.innerHTML='';

  if(!sk){
    cont.innerHTML=`<div class="rest-card"><span class="rest-emoji">😴</span><div class="rest-title">DESCANSO TOTAL</div><div class="rest-txt">El músculo crece mientras descansás. Recuperación activa recomendada.</div></div>`;
    return;
  }

  const sess=POST[sk];
  const hero=document.createElement('div');
  hero.className='post-hero';
  hero.innerHTML=`<div class="post-badge"><div class="pb-dot"></div><div class="pb-txt">SESIÓN ${sk}</div></div><div class="post-title">${sess.title}</div><div class="post-desc">${sess.desc}</div>`;
  cont.appendChild(hero);

  const pills=document.createElement('div');
  pills.className='phase-pills';
  sess.phases.forEach(ph=>{
    const done=ph.ex.every(e=>pd[e.id]);
    pills.innerHTML+=`<div class="ph-pill${done?' done-ph':''}">${done?'✓ ':''}${ph.name}</div>`;
  });
  cont.appendChild(pills);

  sess.phases.forEach((ph,pi)=>{
    const bt=document.createElement('div');
    bt.className='ph-block-title';
    bt.textContent=`${ph.name} — ${ph.sub}`;
    cont.appendChild(bt);
    ph.ex.forEach((ex,ei)=>{
      const ok=!!pd[ex.id];
      const card=document.createElement('div');
      card.className=`p-card${ok?' p-done':''}${ei===0&&pi===0?' p-open':''}`;
      card.id='pe'+ex.id;
      card.style.animationDelay=(ei*0.04)+'s';
      const steps=ex.steps.map((s,i)=>`<li><span class="p-sn">${i+1}</span>${s}</li>`).join('');
      const safeN=ex.name.replace(/'/g,"\\'");
      const tb=ex.timer?`<button class="tbtn" onclick="openTimer(${ex.timer},'${safeN}')">⏱ ${ex.timer}s</button>`:'';
      card.innerHTML=`<div class="p-hdr" onclick="togP('${ex.id}')">
        <div class="p-chk" id="pc${ex.id}">${ok?'✓':''}</div>
        <div class="p-inf"><div class="p-nm">${ex.name}</div><div class="p-pm">${ex.params}</div></div>
        <span class="p-chev">▼</span>
      </div>
      <div class="p-body"><div class="p-detail">
        <div class="p-why"><strong>¿Por qué?</strong> ${ex.why}</div>
        <ul class="p-steps">${steps}</ul>
        <div class="p-btns">${tb}<button class="dbtn${ok?' is-done':''}" onclick="togglePost('${ex.id}')">${ok?'✓ Hecho':'Marcar hecho'}</button></div>
      </div></div>`;
      cont.appendChild(card);
    });
  });
}

function togP(id){document.getElementById('pe'+id).classList.toggle('p-open')}
function togglePost(id){
  pd[id]=!pd[id];
  sp();
  renderPostura(curDay);
  buildDays();
}

// ── RESUMEN VIEW ──
function renderResumen(){
  const cont=document.getElementById('resContent');
  cont.innerHTML='';
  const today=new Date().getDay();
  const gp=gymPct(today), mok=mobDone(today), pp=postPct(today), tp=totalPct(today);

  cont.innerHTML+=`<div class="res-header"><div class="res-title">RESUMEN SEMANAL</div><div class="res-sub">Vista general · progreso y actividades</div></div>`;

  // Today box
  const tb=document.createElement('div');
  tb.className='today-box';
  tb.innerHTML=`<div class="today-box-lbl">📅 HOY — ${DN[today]}</div>
    <div class="today-pct-row">
      <div class="today-pct-num">${tp}%</div>
      <div class="today-pct-info">
        <div class="today-pct-label">Completitud del día</div>
        <div class="today-pct-sub">🏋️ Gym: ${gp}%<br>🧘 Movilidad: ${mok?'✓ listo':pp+'%'}</div>
      </div>
    </div>
    <div class="today-prog"><div class="today-prog-fill" style="width:${tp}%"></div></div>`;
  cont.appendChild(tb);

  // Export
  const expWrap=document.createElement('div');
  expWrap.innerHTML=`<button class="export-btn" onclick="exportExcel()">⬇️ &nbsp;DESCARGAR EXCEL SEMANAL</button><div class="export-note">Exporta el estado actual de todos los ejercicios de la semana</div>`;
  cont.appendChild(expWrap);

  // Week days
  const wl=document.createElement('div');
  wl.className='week-label';
  wl.textContent='ACTIVIDADES POR DÍA';
  cont.appendChild(wl);

  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    const data=GYM[d];
    const tp2=totalPct(d);
    const isToday=i===0;
    const sk=postSessKey(d); // usa función consistente
    const pctColor=tp2>=100?'var(--green)':tp2>0?'var(--gold)':'var(--text-3)';

    let acts=[];
    if(sk){
      acts.push({type:'mob',name:`🧘 Movilidad Sesión ${sk} — ${POST[sk].title}`,done:mobDone(d)});
    }
    if(data){
      data.sessions.forEach(sess=>{
        const dn=sess.ex.filter(e=>gd[e.n]).length;
        acts.push({type:sess.ic==='ic-run'?'run':'gym',name:`${sess.icon} ${sess.name} (${dn}/${sess.ex.length})`,done:dn===sess.ex.length});
      });
    } else {
      acts.push({type:'rest',name:'😴 Descanso total',done:true});
    }

    const actsHTML=acts.map(a=>`<div class="res-act">
      <div class="res-act-dot dot-${a.type}"></div>
      <div class="res-act-name">${a.name}</div>
      <div class="${a.done?'res-act-ok':'res-act-pend'}">${a.done?'✓ hecho':'pendiente'}</div>
    </div>`).join('');

    const card=document.createElement('div');
    card.className=`res-day-card${isToday?' r-open':''}`;
    card.id='rd'+i;
    card.innerHTML=`<div class="res-day-hdr" onclick="togR(${i})">
      <div class="res-day-num${isToday?' today':''}">${dt.getDate()}</div>
      <div class="res-day-info">
        <div class="res-day-name">${DS[d]}${isToday?' · HOY':''}</div>
        <div class="res-day-sub">${data?data.label:'Descanso'}</div>
      </div>
      <div class="res-day-pct" style="color:${pctColor}">${tp2>0?tp2+'%':data?'—':'😴'}</div>
      <span class="res-day-chev">▼</span>
    </div>
    <div class="res-day-body"><div class="res-act-list">${actsHTML}</div></div>`;
    cont.appendChild(card);
  }
}

function togR(i){document.getElementById('rd'+i).classList.toggle('r-open')}

// ── EXCEL EXPORT ──
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const today=new Date().getDay();

  const s1=[['DÍA','FECHA','MOVILIDAD','GYM %','TOTAL %','ESTADO']];
  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    s1.push([DN[d],dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
      mobDone(d)?'✅ Completo':'⏳ Pendiente',
      GYM[d]?gymPct(d)+'%':'N/A',totalPct(d)+'%',
      totalPct(d)>=100?'✅ Completo':totalPct(d)>0?'🔄 En progreso':'⏳ Sin iniciar']);
  }
  const ws1=XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:14},{wch:14},{wch:16},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen Semanal');

  const s2=[['DÍA','SESIÓN','EJERCICIO','SERIES/REPS','CATEGORÍA','ESTADO']];
  for(let d=0;d<7;d++){const data=GYM[d];if(!data)continue;data.sessions.forEach(sess=>{sess.ex.forEach(ex=>{s2.push([DN[d],sess.name,ex.n,ex.m,TL[ex.t]||ex.t,gd[ex.n]?'✅ Hecho':'⏳ Pendiente'])})});}
  const ws2=XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:12},{wch:22},{wch:32},{wch:18},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Gym Detallado');

  const s3=[['SESIÓN','FASE','EJERCICIO','PARÁMETROS','ESTADO']];
  ['A','B'].forEach(sk=>{const sess=POST[sk];sess.phases.forEach(ph=>{ph.ex.forEach(ex=>{s3.push([sess.name+' — '+sess.title,ph.name,ex.name,ex.params,pd[ex.id]?'✅ Hecho':'⏳ Pendiente'])})})});
  const ws3=XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:28},{wch:16},{wch:32},{wch:22},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,'Movilidad Detallada');

  const date=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
  XLSX.writeFile(wb,'reestructuracion_'+date+'.xlsx');
}

// ── TIMER ──
function openTimer(s,l){
  timerSecs=s; timerTotal=s; timerRunning=false;
  clearInterval(timerInterval);
  document.getElementById('tDisp').textContent=fmt(s);
  document.getElementById('tLbl').textContent=l;
  document.getElementById('tToggle').textContent='INICIAR';
  updateCircle(s,s);
  document.getElementById('timerOv').classList.add('show');
}
function updateCircle(remaining,total){
  const circ=document.getElementById('tCircle');
  const r=82; const c=2*Math.PI*r;
  const pct=total>0?remaining/total:0;
  circ.style.strokeDasharray=c;
  circ.style.strokeDashoffset=c*(1-pct);
}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('tToggle').textContent='CONTINUAR';
  } else {
    timerRunning=true;
    document.getElementById('tToggle').textContent='PAUSAR';
    timerInterval=setInterval(()=>{
      timerSecs--;
      updateCircle(Math.max(0,timerSecs),timerTotal);
      document.getElementById('tDisp').textContent=timerSecs>0?fmt(timerSecs):'¡LISTO!';
      if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('tToggle').textContent='REINICIAR';}
    },1000);
  }
}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerOv').classList.remove('show')}
function fmt(s){const m=Math.floor(s/60);const sec=s%60;return m+':'+(sec<10?'0':'')+sec}

// ── NAV ──
function sw(v){
  if(v==='postura') renderPostura(curDay);
  if(v==='resumen') renderResumen();
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
}

init();
</script>
