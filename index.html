<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reestructuración Corporal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#080c10; --card:#111820; --card2:#161f28;
  --gold:#e8b84b; --gold2:#f5d080; --blue:#4ab8ff;
  --green:#4aaa6a; --text:#eef2f7; --muted:#556070;
  --border:#1e2a36;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

.header{padding:16px 16px 10px;position:sticky;top:0;background:rgba(8,12,16,0.97);backdrop-filter:blur(20px);z-index:100;border-bottom:1px solid var(–border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.app-title{font-family:‘Barlow Condensed’,sans-serif;font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,var(–gold),var(–gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.app-title small{display:block;font-size:8px;font-weight:400;letter-spacing:3px;-webkit-text-fill-color:rgba(245,208,128,0.55)}
.today-date{font-size:10px;color:var(–muted);font-weight:500}

.day-selector{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.day-selector::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 9px;border-radius:10px;border:1px solid var(–border);background:var(–card);cursor:pointer;transition:all 0.2s;min-width:44px}
.day-btn.active{background:linear-gradient(135deg,#1a2a1a,#0f1f0f);border-color:var(–gold);box-shadow:0 0 14px rgba(232,184,75,0.2)}
.day-btn .dn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(–muted)}
.day-btn.active .dn{color:var(–gold)}
.day-btn .dd{font-family:‘Barlow Condensed’,sans-serif;font-size:20px;font-weight:700;color:var(–text);line-height:1}
.day-btn.active .dd{color:var(–gold2)}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(–gold);opacity:0;margin-top:1px}
.day-btn.has-dot .day-dot{opacity:0.5}
.day-btn.active .day-dot{opacity:0}
.day-btn.full-done .day-dot{background:var(–green);opacity:1}

.content{padding:16px;padding-bottom:110px}

.day-hero{margin-bottom:16px;position:relative;overflow:hidden}
.day-hero-bg{position:absolute;top:-6px;right:-2px;font-family:‘Barlow Condensed’,sans-serif;font-size:96px;font-weight:900;color:rgba(232,184,75,0.035);line-height:1;pointer-events:none;user-select:none}
.day-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(–gold);margin-bottom:3px}
.day-big{font-family:‘Barlow Condensed’,sans-serif;font-size:44px;font-weight:900;letter-spacing:2px;line-height:1}
.day-sub{color:var(–muted);font-size:11px;margin-top:3px}

/* COMPLETION SQUARES */
.comp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.comp-item{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:14px 12px;text-align:center;cursor:pointer;transition:all 0.25s;position:relative}
.comp-item.done{background:rgba(74,170,106,0.1);border-color:var(–green)}
.comp-item.auto{cursor:default}
.comp-icon{font-size:20px;margin-bottom:5px}
.comp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(–muted);margin-bottom:3px}
.comp-item.done .comp-label{color:var(–green)}
.comp-pct{font-family:‘Barlow Condensed’,sans-serif;font-size:24px;font-weight:900;color:var(–gold);line-height:1}
.comp-item.done .comp-pct{color:var(–green)}
.comp-status{font-size:9px;color:var(–muted);margin-top:2px}
.comp-item.done .comp-status{color:var(–green);font-weight:600}
.comp-check{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:4px;border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:transparent;transition:all 0.2s}
.comp-item.done .comp-check{background:var(–green);border-color:var(–green);color:#fff}

/* SESSION CARDS */
.session-card{background:var(–card);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(–border);transition:border-color 0.2s;animation:fadeUp 0.25s ease both}
.session-card.open{border-color:rgba(232,184,75,0.3)}
.session-card.all-done{border-color:rgba(74,170,106,0.4)}
.sess-hdr{padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.s-ico{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ic-gym{background:linear-gradient(135deg,#1a4a1a,#2d6e2d);border:1px solid var(–gold)}
.ic-run{background:linear-gradient(135deg,#0a3a5e,#1565a0)}
.s-inf{flex:1;min-width:0}
.s-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(–muted);margin-bottom:1px}
.s-name{font-family:‘Barlow Condensed’,sans-serif;font-size:17px;font-weight:700;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-bdg{font-size:10px;font-weight:600;color:var(–gold);background:rgba(232,184,75,0.1);padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.s-bdg.ok{color:var(–green);background:rgba(74,170,106,0.1)}
.chevron{color:var(–muted);transition:transform 0.3s;font-size:9px;flex-shrink:0}
.session-card.open .chevron{transform:rotate(180deg)}
.sess-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.session-card.open .sess-body{max-height:2400px}
.s-div{height:1px;background:var(–border);margin:0 15px}
.pbar-wrap{padding:9px 15px 7px}
.pbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(–muted);margin-bottom:4px}
.pbar{height:3px;background:var(–border);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:2px;transition:width 0.4s}
.pbar-fill.gfill{background:linear-gradient(90deg,var(–green),#6dcc8a)}

.ex-list{padding:3px 15px 14px}
.ex-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(–border);cursor:pointer;transition:opacity 0.2s}
.ex-item:last-child{border-bottom:none}
.ex-item.done{opacity:0.35}
.ex-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.2s}
.ex-item.done .ex-chk{background:var(–gold);border-color:var(–gold);color:#000;font-weight:700}
.ex-det{flex:1;min-width:0}
.ex-nm{font-size:13px;font-weight:500;color:var(–text);margin-bottom:1px}
.ex-mt{font-size:10px;color:var(–muted)}
.ex-nt{font-size:9px;color:var(–gold);margin-top:1px;font-style:italic}
.ex-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.tag-thor{background:rgba(232,184,75,0.15);color:var(–gold)}
.tag-postura{background:rgba(255,77,77,0.15);color:#ff7777}
.tag-correctivo{background:rgba(74,184,255,0.15);color:var(–blue)}
.tag-atletico{background:rgba(100,220,100,0.15);color:#6ddc6d}

.rest-card{background:var(–card);border-radius:12px;padding:44px 20px;text-align:center;border:1px solid var(–border)}
.rest-emoji{font-size:48px;margin-bottom:12px}
.rest-title{font-family:‘Barlow Condensed’,sans-serif;font-size:28px;font-weight:900;letter-spacing:2px;color:#8060cc;margin-bottom:6px}
.rest-txt{color:var(–muted);font-size:12px;line-height:1.6}

/* POSTURA */
.post-hero{background:linear-gradient(135deg,#0a1520,#0a0f1a);border:1px solid rgba(74,184,255,0.2);border-radius:12px;padding:18px;margin-bottom:14px}
.post-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(74,184,255,0.1);border:1px solid rgba(74,184,255,0.3);border-radius:7px;padding:6px 12px;margin-bottom:12px}
.pb-dot{width:7px;height:7px;border-radius:50%;background:var(–blue)}
.pb-txt{font-size:11px;font-weight:600;color:var(–blue)}
.post-title{font-family:‘Barlow Condensed’,sans-serif;font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:5px}
.post-desc{font-size:11px;color:var(–muted);line-height:1.6}
.phase-pills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.ph-pill{padding:5px 12px;border-radius:7px;border:1px solid var(–border);background:var(–card);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(–muted);flex-shrink:0}
.ph-pill.done-ph{border-color:var(–green);color:var(–green);background:rgba(74,170,106,0.08)}
.ph-block-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin:14px 0 7px;display:flex;align-items:center;gap:8px}
.ph-block-title::after{content:’’;flex:1;height:1px;background:var(–border)}

.p-card{background:var(–card);border-radius:10px;margin-bottom:8px;border:1px solid var(–border);overflow:hidden;animation:fadeUp 0.22s ease both}
.p-card.p-done{border-color:rgba(74,170,106,0.35);opacity:0.5}
.p-hdr{padding:12px 14px;display:flex;align-items:center;gap:11px;cursor:pointer}
.p-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all 0.2s;background:var(–card2)}
.p-card.p-done .p-chk{background:var(–green);border-color:var(–green);color:#fff;font-weight:700}
.p-inf{flex:1}
.p-nm{font-size:13px;font-weight:600;margin-bottom:1px}
.p-pm{font-size:10px;color:var(–muted)}
.p-chev{color:var(–muted);font-size:9px;transition:transform 0.3s;flex-shrink:0}
.p-card.p-open .p-chev{transform:rotate(180deg)}
.p-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.p-card.p-open .p-body{max-height:600px}
.p-detail{padding:0 14px 13px;border-top:1px solid var(–border)}
.p-why{background:rgba(74,184,255,0.06);border-left:3px solid var(–blue);border-radius:0 5px 5px 0;padding:8px 10px;font-size:10px;color:rgba(74,184,255,0.8);line-height:1.5;margin-top:10px;margin-bottom:7px}
.p-why strong{color:var(–blue)}
.p-steps{list-style:none}
.p-steps li{display:flex;gap:8px;font-size:10px;line-height:1.5;padding:4px 0;border-bottom:1px solid var(–border);color:var(–text)}
.p-steps li:last-child{border-bottom:none}
.p-sn{font-family:‘Barlow Condensed’,sans-serif;font-size:10px;font-weight:700;color:var(–blue);flex-shrink:0;width:12px;margin-top:1px}
.p-btns{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:4px;background:rgba(74,184,255,0.1);color:var(–blue);border:1px solid rgba(74,184,255,0.2);border-radius:5px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif}
.dbtn{display:inline-flex;align-items:center;gap:4px;background:var(–card2);color:var(–muted);border:1px solid var(–border);border-radius:5px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all 0.2s}
.dbtn.is-done{background:rgba(74,170,106,0.15);color:var(–green);border-color:var(–green)}

/* RESUMEN */
.res-title-block{margin-bottom:16px}
.res-title{font-family:‘Barlow Condensed’,sans-serif;font-size:32px;font-weight:900;letter-spacing:2px;margin-bottom:3px}
.res-sub{font-size:11px;color:var(–muted)}

.today-box{background:linear-gradient(135deg,rgba(232,184,75,0.09),rgba(232,184,75,0.03));border:1px solid rgba(232,184,75,0.25);border-radius:12px;padding:16px;margin-bottom:14px}
.today-box-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(–gold);margin-bottom:10px}
.today-pct-row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.today-pct-num{font-family:‘Barlow Condensed’,sans-serif;font-size:52px;font-weight:900;color:var(–gold);line-height:1}
.today-pct-info{flex:1}
.today-pct-label{font-size:12px;color:var(–text);font-weight:600;margin-bottom:3px}
.today-pct-sub{font-size:10px;color:var(–muted)}
.today-prog{height:5px;background:var(–border);border-radius:3px;overflow:hidden;margin-top:6px}
.today-prog-fill{height:100%;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:3px;transition:width 0.5s}

.export-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(–gold),var(–gold2));color:#000;font-family:‘Barlow Condensed’,sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s}
.export-btn:active{opacity:0.8}
.export-note{font-size:10px;color:var(–muted);text-align:center;margin-bottom:18px}

.week-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(–muted);margin-bottom:10px}

.res-day-card{background:var(–card);border-radius:10px;margin-bottom:8px;border:1px solid var(–border);overflow:hidden}
.res-day-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.res-day-num{font-family:‘Barlow Condensed’,sans-serif;font-size:24px;font-weight:900;line-height:1;min-width:36px}
.res-day-info{flex:1}
.res-day-name{font-size:13px;font-weight:700;margin-bottom:1px}
.res-day-sub{font-size:10px;color:var(–muted)}
.res-day-pct{font-family:‘Barlow Condensed’,sans-serif;font-size:18px;font-weight:900;flex-shrink:0}
.res-day-chev{color:var(–muted);font-size:9px;transition:transform 0.3s;flex-shrink:0}
.res-day-card.r-open .res-day-chev{transform:rotate(180deg)}
.res-day-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.res-day-card.r-open .res-day-body{max-height:400px}
.res-act-list{padding:4px 14px 12px}
.res-act{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(–border);font-size:12px}
.res-act:last-child{border-bottom:none}
.res-act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-mob{background:var(–blue)}
.dot-gym{background:var(–gold)}
.dot-run{background:#6ddc6d}
.dot-rest{background:var(–muted)}
.res-act-name{flex:1;color:var(–text)}
.res-act-ok{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(–green)}
.res-act-pend{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(–muted)}

/* TIMER */
.timer-ov{display:none;position:fixed;inset:0;background:rgba(8,12,16,0.96);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.timer-ov.show{display:flex}
.t-disp{font-family:‘Barlow Condensed’,sans-serif;font-size:78px;font-weight:900;color:var(–text);line-height:1;margin-bottom:6px}
.t-lbl{font-size:12px;color:var(–muted);margin-bottom:36px;text-align:center;padding:0 20px}
.t-ctrl{display:flex;gap:10px}
.t-btn{padding:13px 26px;border-radius:9px;font-family:‘Barlow Condensed’,sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;border:none;cursor:pointer}
.t-btn.pri{background:var(–gold);color:#000}
.t-btn.sec{background:var(–card);color:var(–muted);border:1px solid var(–border)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,16,0.97);backdrop-filter:blur(20px);border-top:1px solid var(–border);padding:9px 6px 22px;display:flex;justify-content:space-around;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:rgba(245,240,232,0.3);transition:color 0.2s;padding:4px 12px;border-radius:7px}
.nav-btn.active{color:var(–gold)}
.nav-btn .ni{font-size:19px}
.nav-btn .nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:‘Barlow Condensed’,sans-serif}

.view{display:none}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
</style>

</head>
<body>

<div class="timer-ov" id="timerOv">
  <div class="t-disp" id="tDisp">1:00</div>
  <div class="t-lbl" id="tLbl">—</div>
  <div class="t-ctrl">
    <button class="t-btn pri" id="tToggle" onclick="toggleTimer()">INICIAR</button>
    <button class="t-btn sec" onclick="closeTimer()">CERRAR</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="app-title">REESTRUCTURACIÓN CORPORAL<small>protocolo integral · thor mode</small></div>
    <div class="today-date" id="todayDate"></div>
  </div>
  <div class="day-selector" id="daySelector"></div>
</div>

<div class="content">
  <div class="view active" id="view-gym">
    <div class="day-hero">
      <div class="day-hero-bg" id="dayBg">LUN</div>
      <div class="day-lbl" id="dayLbl">—</div>
      <div class="day-big" id="dayBig">LUNES</div>
      <div class="day-sub" id="daySub">—</div>
    </div>
    <div class="comp-row" id="compRow"></div>
    <div id="gymContent"></div>
  </div>
  <div class="view" id="view-postura"><div id="postContent"></div></div>
  <div class="view" id="view-resumen"><div id="resContent"></div></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="sw('gym')" id="nav-gym"><span class="ni">🏋️</span><span class="nl">Gym</span></button>
  <button class="nav-btn" onclick="sw('postura')" id="nav-postura"><span class="ni">🧘</span><span class="nl">Postura</span></button>
  <button class="nav-btn" onclick="sw('resumen')" id="nav-resumen"><span class="ni">📊</span><span class="nl">Resumen</span></button>
</div>

<script>
const DS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DN=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
const TL={thor:'thor',postura:'postura',correctivo:'correctivo',atletico:'atlético'};

const GYM={
  0:null,
  1:{label:'Movilidad + Pasadas',sessions:[
    {id:'r1',type:'Tarde · 20:30',name:'Pasadas — Velocidad',icon:'🏃',ic:'ic-run',ex:[
      {n:'Calentamiento trote suave',m:'10 minutos',t:'atletico'},
      {n:'6 × 80m al 85-90%',m:'Descanso 90" entre series',note:'Pisada simétrica — observá talón derecho',t:'atletico'},
      {n:'Vuelta a la calma',m:'5 min caminando',t:'atletico'}]}]},
  2:{label:'🔱 Espalda + Hombros',sessions:[
    {id:'g2',type:'11:45 am · Gym Río',name:'Espalda + Hombros',icon:'🏋️',ic:'ic-gym',ex:[
      {n:'Dominadas pronadas',m:'4 × Máx reps',note:'Escápulas abajo antes de subir',t:'thor'},
      {n:'Remo con barra',m:'4 × 8-10 reps',note:'Codos cerca del cuerpo',t:'thor'},
      {n:'Pullover con mancuerna',m:'3 × 12 reps',note:'Estira el dorsal al máximo',t:'thor'},
      {n:'Face pull con polea',m:'4 × 15 reps',note:'CLAVE: postura + trapecios',t:'postura'},
      {n:'Press militar de pie',m:'4 × 8-10 reps',t:'thor'},
      {n:'Elevaciones laterales',m:'5 × 15-20 reps',note:'⭐ Ejercicio #1 para Hemsworth',t:'thor'},
      {n:'Encogimientos con mancuernas',m:'3 × 12 reps',note:'Trapecios',t:'thor'},
      {n:'Retracción escapular con banda',m:'3 × 15 reps',t:'postura'}]}]},
  3:{label:'Pasadas AM + Piernas PM',sessions:[
    {id:'r3',type:'Mañana · 6:30',name:'Pasadas — Velocidad',icon:'🏃',ic:'ic-run',ex:[
      {n:'Calentamiento trote suave',m:'10 minutos',t:'atletico'},

// STATE
let curDay=new Date().getDay();
let gd={},pd={},md={};
let timerInterval=null,timerSecs=0,timerRunning=false;
try{gd=JSON.parse(sessionStorage.getItem('gd')||'{}')}catch(e){}
try{pd=JSON.parse(sessionStorage.getItem('pd')||'{}')}catch(e){}
try{md=JSON.parse(sessionStorage.getItem('md')||'{}')}catch(e){}
const sg=()=>{try{sessionStorage.setItem('gd',JSON.stringify(gd))}catch(e){}};
const sp=()=>{try{sessionStorage.setItem('pd',JSON.stringify(pd))}catch(e){}};
const sm=()=>{try{sessionStorage.setItem('md',JSON.stringify(md))}catch(e){}};

function mobKey(d){return 'm'+d+'_'+new Date().toDateString()}
function gymPct(d){const data=GYM[d];if(!data)return 0;const a=data.sessions.flatMap(s=>s.ex);return a.length?Math.round(a.filter(e=>gd[e.n]).length/a.length*100):0}
function postPct(d){const sk=[1,2,5].includes(d)?'A':'B';const a=POST[sk].phases.flatMap(p=>p.ex);return a.length?Math.round(a.filter(e=>pd[e.id]).length/a.length*100):0}
function mobDone(d){return !!md[mobKey(d)]}
function totalPct(d){return Math.round((gymPct(d)+(mobDone(d)?100:postPct(d)))/2)}

function init(){
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  buildDays(); renderDay(curDay);
}

function buildDays(){
  const cont=document.getElementById('daySelector');
  cont.innerHTML='';
  const today=new Date().getDay();
  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    const tp=totalPct(d);
    const btn=document.createElement('div');
    btn.className=`day-btn${d===curDay?' active':''} has-dot${tp>=100?' full-done':''}`;
    btn.dataset.day=d;
    btn.innerHTML=`<span class="dn">${DS[d]}</span><span class="dd">${dt.getDate()}</span><div class="day-dot"></div>`;
    btn.onclick=()=>selDay(d);
    cont.appendChild(btn);
  }
}

function selDay(d){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.day)===d));
  renderDay(d);
  const postView=document.getElementById('view-postura');
  if(postView.classList.contains('active')){renderPostura(d);}
  const resView=document.getElementById('view-resumen');
  if(resView.classList.contains('active')){renderResumen();}
}
  
function renderDay(d){
  const data=GYM[d];
  document.getElementById('dayBig').textContent=DN[d];
  document.getElementById('dayBg').textContent=DS[d].toUpperCase();
  if(!data){
    document.getElementById('dayLbl').textContent='Descanso';
    document.getElementById('daySub').textContent='Recuperación activa';
    document.getElementById('compRow').innerHTML='';
    document.getElementById('gymContent').innerHTML=`<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">DESCANSO TOTAL</div><div class="rest-txt">El músculo crece mientras descansás.<br>Hidratate · 8 horas de sueño · proteína.</div></div>`;
    return;
  }
  document.getElementById('dayLbl').textContent=data.label;
  document.getElementById('daySub').textContent=`${data.sessions.length} sesión${data.sessions.length>1?'es':''} · ⚡ Thor Mode`;
  renderComp(d,data); renderSessions(d,data);
}

function renderComp(d,data){
  const gp=gymPct(d),mok=mobDone(d),pp=postPct(d);
  const row=document.getElementById('compRow');
  row.innerHTML='';
  // Movilidad
  const m=document.createElement('div');
  m.className=`comp-item${mok?' done':''}`;
  m.onclick=()=>toggleMob(d);
  m.innerHTML=`<div class="comp-check">${mok?'✓':''}</div><div class="comp-icon">🧘</div><div class="comp-label">Movilidad</div><div class="comp-pct">${pp}%</div><div class="comp-status">${mok?'✓ Completado':'Toca para marcar'}</div>`;
  row.appendChild(m);
  // Gym
  const ok=gp===100;
  const g=document.createElement('div');
  g.className=`comp-item auto${ok?' done':''}`;
  g.innerHTML=`<div class="comp-check">${ok?'✓':''}</div><div class="comp-icon">🏋️</div><div class="comp-label">Gym</div><div class="comp-pct">${gp}%</div><div class="comp-status">${ok?'✓ Completado':'Auto al terminar'}</div>`;
  row.appendChild(g);
}

function toggleMob(d){md[mobKey(d)]=!md[mobKey(d)];sm();renderComp(d,GYM[d]);buildDays()}

function renderSessions(d,data){
  const cont=document.getElementById('gymContent');
  cont.innerHTML='';
  data.sessions.forEach((sess,si)=>{
    const din=sess.ex.filter(e=>gd[e.n]).length;
    const pct=Math.round(din/sess.ex.length*100);
    const ok=din===sess.ex.length;
    const exHTML=sess.ex.map(ex=>{
      const done=gd[ex.n];
      const safe=ex.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="ex-item${done?' done':''}" onclick="toggleGym('${safe}',${d})">
        <div class="ex-chk">${done?'✓':''}</div>
        <div class="ex-det"><div class="ex-nm">${ex.n}</div><div class="ex-mt">${ex.m}</div>${ex.note?`<div class="ex-nt">${ex.note}</div>`:''}</div>
        <span class="ex-tag tag-${ex.t}">${TL[ex.t]}</span>
      </div>`;
    }).join('');
    const card=document.createElement('div');
    card.className=`session-card${si===0?' open':''}${ok?' all-done':''}`;
    card.id='sc'+si;
    card.innerHTML=`<div class="sess-hdr" onclick="togSess(${si})">
      <div class="s-ico ${sess.ic}">${sess.icon}</div>
      <div class="s-inf"><div class="s-type">${sess.type}</div><div class="s-name">${sess.name}</div></div>
      <span class="s-bdg${ok?' ok':''}">${ok?'✓ Listo':din+'/'+sess.ex.length}</span>
      <span class="chevron">▼</span>
    </div>
    <div class="sess-body">
      <div class="s-div"></div>
      <div class="pbar-wrap"><div class="pbar-lbl"><span>Progreso</span><span>${pct}%</span></div><div class="pbar"><div class="pbar-fill${ok?' gfill':''}" style="width:${pct}%"></div></div></div>
      <div class="ex-list">${exHTML}</div>
    </div>`;
    cont.appendChild(card);
  });
}

function togSess(i){document.getElementById('sc'+i).classList.toggle('open')}

function toggleGym(name,d){
  gd[name]=!gd[name];sg();
  renderComp(d,GYM[d]);renderSessions(d,GYM[d]);buildDays();
}

// POSTURA
function renderPostura(d){
  const sk=[1,4,6].includes(d)?'A':'B';
  const sess=POST[sk];
  const cont=document.getElementById('postContent');
  cont.innerHTML='';
  const hero=document.createElement('div');
  hero.className='post-hero';
  hero.innerHTML=`<div class="post-badge"><div class="pb-dot"></div><div class="pb-txt">SESIÓN ${sk} — ${sess.days}</div></div><div class="post-title">${sess.title}</div><div class="post-desc">${sess.desc}</div>`;
  cont.appendChild(hero);
  const pills=document.createElement('div');
  pills.className='phase-pills';
  sess.phases.forEach(ph=>{const done=ph.ex.every(e=>pd[e.id]);pills.innerHTML+=`<div class="ph-pill${done?' done-ph':''}">${done?'✓ ':''}${ph.name}</div>`;});
  cont.appendChild(pills);
  sess.phases.forEach((ph,pi)=>{
    const bt=document.createElement('div');
    bt.className='ph-block-title';
    bt.textContent=`${ph.name} — ${ph.sub}`;
    cont.appendChild(bt);
    ph.ex.forEach((ex,ei)=>{
      const ok=pd[ex.id];
      const card=document.createElement('div');
      card.className=`p-card${ok?' p-done':''}${ei===0&&pi===0?' p-open':''}`;
      card.id='pe'+ex.id;
      card.style.animationDelay=(ei*0.04)+'s';
      const steps=ex.steps.map((s,i)=>`<li><span class="p-sn">${i+1}</span>${s}</li>`).join('');
      const safeN=ex.name.replace(/'/g,"\\'");
      const tb=ex.timer?`<button class="tbtn" onclick="openTimer(${ex.timer},'${safeN}')">⏱ ${ex.timer}s</button>`:'';
      card.innerHTML=`<div class="p-hdr" onclick="togP('${ex.id}')">
        <div class="p-chk" id="pc${ex.id}">${ok?'✓':''}</div>
        <div class="p-inf"><div class="p-nm">${ex.name}</div><div class="p-pm">${ex.params}</div></div>
        <span class="p-chev">▼</span>
      </div>
      <div class="p-body"><div class="p-detail">
        <div class="p-why"><strong>¿Por qué?</strong> ${ex.why}</div>
        <ul class="p-steps">${steps}</ul>
        <div class="p-btns">${tb}<button class="dbtn${ok?' is-done':''}" onclick="togglePost('${ex.id}')">${ok?'✓ Hecho':'Marcar hecho'}</button></div>
      </div></div>`;
      cont.appendChild(card);
    });
  });
}

function togP(id){document.getElementById('pe'+id).classList.toggle('p-open')}
function togglePost(id){pd[id]=!pd[id];sp();renderPostura(curDay);buildDays()}

// RESUMEN
function renderResumen(){
  const cont=document.getElementById('resContent');
  cont.innerHTML='';
  const today=new Date().getDay();
  const gp=gymPct(today),pp=postPct(today),mok=mobDone(today),tp=totalPct(today);

  // Title
  cont.innerHTML+=`<div class="res-title-block"><div class="res-title">RESUMEN SEMANAL</div><div class="res-sub">Vista general · progreso y actividades</div></div>`;

  // Today box
  const tb=document.createElement('div');
  tb.className='today-box';
  tb.innerHTML=`<div class="today-box-lbl">📅 HOY — ${DN[today]}</div>
    <div class="today-pct-row">
      <div class="today-pct-num">${tp}%</div>
      <div class="today-pct-info">
        <div class="today-pct-label">Completitud del día</div>
        <div class="today-pct-sub">🏋️ Gym: ${gp}% &nbsp;·&nbsp; 🧘 Movilidad: ${mok?'✓ listo':pp+'%'}</div>
      </div>
    </div>
    <div class="today-prog"><div class="today-prog-fill" style="width:${tp}%"></div></div>`;
  cont.appendChild(tb);

  // Export
  const expWrap=document.createElement('div');
  expWrap.innerHTML=`<button class="export-btn" onclick="exportExcel()">⬇️ &nbsp;DESCARGAR EXCEL SEMANAL</button><div class="export-note">Exporta el estado actual de todos los ejercicios de la semana</div>`;
  cont.appendChild(expWrap);

  // Week
  const wl=document.createElement('div');
  wl.className='week-label';
  wl.textContent='ACTIVIDADES POR DÍA';
  cont.appendChild(wl);

  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    const data=GYM[d];
    const tp2=totalPct(d);
    const isToday=i===0;
    const pctColor=tp2>=100?'var(--green)':tp2>0?'var(--gold)':'var(--muted)';
    const sk=[1,2,5].includes(d)?'A':'B';

    // Build activity summary
    let acts=[];
    acts.push({type:'mob',name:`🧘 Movilidad Sesión ${sk} — ${POST[sk].title}`,done:mobDone(d)});
    if(data){
      data.sessions.forEach(sess=>{
        const dn=sess.ex.filter(e=>gd[e.n]).length;
        acts.push({type:sess.ic==='ic-run'?'run':'gym',name:`${sess.icon} ${sess.name} (${dn}/${sess.ex.length})`,done:dn===sess.ex.length});
      });
    } else {
      acts.push({type:'rest',name:'😴 Descanso total',done:true});
    }

    const actsHTML=acts.map(a=>`<div class="res-act">
      <div class="res-act-dot dot-${a.type}"></div>
      <div class="res-act-name">${a.name}</div>
      <div class="${a.done?'res-act-ok':'res-act-pend'}">${a.done?'✓ hecho':'pendiente'}</div>
    </div>`).join('');

    const card=document.createElement('div');
    card.className=`res-day-card${isToday?' r-open':''}`;
    card.id='rd'+i;
    card.innerHTML=`<div class="res-day-hdr" onclick="togR(${i})">
      <div class="res-day-num" style="color:${isToday?'var(--gold)':'var(--text)'}">${dt.getDate()}</div>
      <div class="res-day-info">
        <div class="res-day-name">${DS[d]}${isToday?' · HOY':''}</div>
        <div class="res-day-sub">${data?data.label:'Descanso'}</div>
      </div>
      <div class="res-day-pct" style="color:${pctColor}">${tp2>0?tp2+'%':data?'—':'😴'}</div>
      <span class="res-day-chev">▼</span>
    </div>
    <div class="res-day-body"><div class="res-act-list">${actsHTML}</div></div>`;
    cont.appendChild(card);
  }
}

function togR(i){document.getElementById('rd'+i).classList.toggle('r-open')}

// EXCEL EXPORT
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const today=new Date().getDay();

  // Sheet 1: Resumen
  const s1=[['DÍA','FECHA','MOVILIDAD','GYM %','TOTAL %','ESTADO']];
  for(let i=0;i<7;i++){
    const d=(today+i)%7;
    const dt=new Date(); dt.setDate(dt.getDate()+i);
    s1.push([DN[d],dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
      mobDone(d)?'✅ Completo':'⏳ Pendiente',
      GYM[d]?gymPct(d)+'%':'N/A',totalPct(d)+'%',
      totalPct(d)>=100?'✅ Completo':totalPct(d)>0?'🔄 En progreso':'⏳ Sin iniciar']);
  }
  const ws1=XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:14},{wch:14},{wch:16},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen Semanal');

  // Sheet 2: Gym
  const s2=[['DÍA','SESIÓN','EJERCICIO','SERIES/REPS','CATEGORÍA','ESTADO']];
  for(let d=0;d<7;d++){const data=GYM[d];if(!data)continue;data.sessions.forEach(sess=>{sess.ex.forEach(ex=>{s2.push([DN[d],sess.name,ex.n,ex.m,TL[ex.t]||ex.t,gd[ex.n]?'✅ Hecho':'⏳ Pendiente'])})});}
  const ws2=XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:12},{wch:22},{wch:32},{wch:18},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Gym Detallado');

  // Sheet 3: Movilidad
  const s3=[['SESIÓN','FASE','EJERCICIO','PARÁMETROS','ESTADO']];
  ['A','B'].forEach(sk=>{const sess=POST[sk];sess.phases.forEach(ph=>{ph.ex.forEach(ex=>{s3.push([sess.name+' — '+sess.title,ph.name,ex.name,ex.params,pd[ex.id]?'✅ Hecho':'⏳ Pendiente'])})})});
  const ws3=XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:28},{wch:16},{wch:32},{wch:22},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,'Movilidad Detallada');

  const date=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
  XLSX.writeFile(wb,'reestructuracion_'+date+'.xlsx');
}

// TIMER
function openTimer(s,l){timerSecs=s;timerRunning=false;clearInterval(timerInterval);document.getElementById('tDisp').textContent=fmt(s);document.getElementById('tLbl').textContent=l;document.getElementById('tToggle').textContent='INICIAR';document.getElementById('timerOv').classList.add('show')}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('tToggle').textContent='CONTINUAR';}
  else{timerRunning=true;document.getElementById('tToggle').textContent='PAUSAR';timerInterval=setInterval(()=>{timerSecs--;document.getElementById('tDisp').textContent=timerSecs>0?fmt(timerSecs):'¡LISTO!';if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('tToggle').textContent='REINICIAR';}},1000);}
}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerOv').classList.remove('show')}
function fmt(s){const m=Math.floor(s/60);const sec=s%60;return m+':'+(sec<10?'0':'')+sec}

function sw(v){
  if(v==='postura')renderPostura(curDay);
  if(v==='resumen')renderResumen();
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
}

init();
</script>
