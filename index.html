<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rutina Tomy</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#080c10;
  --card:#111820;
  --card2:#161f28;
  --card3:#1a2535;
  --gold:#e8b84b;
  --gold2:#f5d080;
  --gold-dim:rgba(232,184,75,0.12);
  --blue:#4ab8ff;
  --blue-dim:rgba(74,184,255,0.1);
  --green:#4aaa6a;
  --green-dim:rgba(74,170,106,0.1);
  --text:#eef2f7;
  --muted:#556070;
  --muted2:#3a4858;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

.header{padding:14px 16px 0;position:sticky;top:0;background:rgba(8,12,16,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.app-title{display:flex;flex-direction:column;gap:1px}
.app-title-main{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.app-title-sub{font-size:9px;font-weight:500;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase}
.today-date{font-size:11px;color:var(--muted);font-weight:500;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 11px}

.day-strip{display:flex;gap:5px;overflow-x:auto;padding:0 0 13px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:11px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.2s;min-width:46px}
.day-btn.active{background:linear-gradient(160deg,rgba(232,184,75,0.15),rgba(232,184,75,0.05));border-color:rgba(232,184,75,0.5);box-shadow:0 0 16px rgba(232,184,75,0.12)}
.day-btn .dn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)}
.day-btn.active .dn{color:var(--gold)}
.day-btn .dd{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--text);line-height:1}
.day-btn.active .dd{color:var(--gold2)}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--muted2);margin-top:1px;transition:all 0.2s}
.day-btn.has-dot .day-dot{background:var(--gold);opacity:0.5}
.day-btn.active .day-dot{opacity:0}
.day-btn.full-done .day-dot{background:var(--green);opacity:1}
.day-btn.today-mark .dn{color:var(--blue)}

.content{padding:18px 16px 110px;position:relative}

.day-hero{margin-bottom:18px;position:relative;overflow:hidden}
.day-hero-bg{position:absolute;top:-8px;right:-4px;font-family:'Barlow Condensed',sans-serif;font-size:100px;font-weight:900;color:rgba(232,184,75,0.03);line-height:1;pointer-events:none;user-select:none;letter-spacing:-2px}
.day-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--gold);margin-bottom:4px}
.day-big{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;letter-spacing:1px;line-height:1;color:var(--text)}
.day-sub{color:var(--muted);font-size:11px;margin-top:5px;font-weight:400}

.comp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 14px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.comp-card.done{background:rgba(74,170,106,0.08);border-color:rgba(74,170,106,0.3)}
.comp-card.auto{cursor:default}
.comp-card.in-prog{border-color:rgba(232,184,75,0.25)}
.comp-icon{font-size:22px;margin-bottom:8px;display:block}
.comp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.comp-card.done .comp-label{color:var(--green)}
.comp-pct{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:3px}
.comp-card.done .comp-pct{color:var(--green)}
.comp-hint{font-size:9px;color:var(--muted);font-weight:500}
.comp-card.done .comp-hint{color:var(--green)}
.comp-check{position:absolute;top:11px;right:11px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;background:var(--card2);transition:all 0.2s}
.comp-card.done .comp-check{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}

.session-card{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;transition:border-color 0.25s;animation:fadeUp 0.25s ease both}
.session-card.open{border-color:var(--border2)}
.session-card.all-done{border-color:rgba(74,170,106,0.35)}
.sess-hdr{padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.s-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border)}
.ic-gym{background:linear-gradient(135deg,rgba(232,184,75,0.15),rgba(232,184,75,0.04))}
.ic-run{background:linear-gradient(135deg,rgba(74,184,255,0.15),rgba(74,184,255,0.04))}
.ic-arco{background:linear-gradient(135deg,rgba(74,170,106,0.15),rgba(74,170,106,0.04))}
.s-inf{flex:1;min-width:0}
.s-type{font-size:9px;font-weight:600;color:var(--muted);margin-bottom:2px}
.s-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-badge{font-size:10px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(232,184,75,0.2);padding:4px 9px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.s-badge.ok{color:var(--green);background:var(--green-dim);border-color:rgba(74,170,106,0.2)}
.chevron{color:var(--muted);transition:transform 0.3s;font-size:10px;flex-shrink:0}
.session-card.open .chevron{transform:rotate(180deg)}
.sess-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.session-card.open .sess-body{max-height:3000px}
.pbar-wrap{padding:10px 15px 8px;border-top:1px solid var(--border)}
.pbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:500}
.pbar{height:3px;background:var(--card3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 0.4s ease}
.pbar-fill.gfill{background:linear-gradient(90deg,var(--green),#6dcc8a)}
.ex-list{padding:4px 15px 14px}
.ex-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.18s}
.ex-item:last-child{border-bottom:none}
.ex-item.done{opacity:0.36}
.ex-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;background:var(--card2);transition:all 0.2s}
.ex-item.done .ex-chk{background:var(--gold);border-color:var(--gold);color:#000;font-weight:800}
.ex-det{flex:1;min-width:0}
.ex-nm{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.ex-mt{font-size:10px;color:var(--muted)}
.ex-nt{font-size:10px;color:var(--gold);margin-top:2px;font-style:italic}
.ex-tag{font-size:8px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:0.6px;flex-shrink:0}
.tag-thor{background:rgba(232,184,75,0.12);color:var(--gold)}
.tag-postura{background:rgba(255,100,100,0.12);color:#ff8080}
.tag-correctivo{background:rgba(74,184,255,0.12);color:var(--blue)}
.tag-atletico{background:rgba(74,170,106,0.12);color:var(--green)}
.tag-arco{background:rgba(180,140,255,0.12);color:#c4a0ff}
.tag-calistenia{background:rgba(255,170,100,0.12);color:#ffb080}

.rest-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:50px 20px;text-align:center}
.rest-emoji{font-size:52px;margin-bottom:14px;display:block}
.rest-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:2px;color:var(--muted);margin-bottom:8px}
.rest-txt{color:var(--muted);font-size:12px;line-height:1.7}

.post-hero{background:linear-gradient(135deg,var(--card3),var(--card));border:1px solid rgba(74,184,255,0.18);border-radius:13px;padding:18px;margin-bottom:14px}
.post-badge{display:inline-flex;align-items:center;gap:7px;background:var(--blue-dim);border:1px solid rgba(74,184,255,0.25);border-radius:20px;padding:5px 13px;margin-bottom:12px}
.pb-dot{width:6px;height:6px;border-radius:50%;background:var(--blue)}
.pb-txt{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase}
.post-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:1px;margin-bottom:6px;color:var(--text)}
.post-desc{font-size:11px;color:var(--muted);line-height:1.65}
.phase-pills{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ph-pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--card)}
.ph-pill.done-ph{border-color:rgba(74,170,106,0.35);color:var(--green);background:var(--green-dim)}
.ph-block-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:10px}
.ph-block-title::after{content:'';flex:1;height:1px;background:var(--border)}
.p-card{background:var(--card);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden;animation:fadeUp 0.22s ease both;transition:border-color 0.2s,opacity 0.2s}
.p-card.p-done{border-color:rgba(74,170,106,0.25);opacity:0.55}
.p-hdr{padding:13px 14px;display:flex;align-items:center;gap:12px;user-select:none}
.p-hdr .p-chk{cursor:pointer}
.p-hdr .p-inf{flex:1;min-width:0;cursor:pointer}
.p-hdr .p-chev{cursor:pointer}
.p-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;background:var(--card2);transition:all 0.2s}
.p-card.p-done .p-chk{background:var(--green);border-color:var(--green);color:#fff;font-weight:800}
.p-inf{flex:1;min-width:0}
.p-nm{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text)}
.p-pm{font-size:10px;color:var(--muted)}
.p-chev{color:var(--muted);font-size:10px;transition:transform 0.3s;flex-shrink:0}
.p-card.p-open .p-chev{transform:rotate(180deg)}
.p-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.p-card.p-open .p-body{max-height:700px}
.p-detail{padding:0 14px 14px;border-top:1px solid var(--border)}
.p-why{background:var(--blue-dim);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:9px 12px;font-size:10px;color:rgba(74,184,255,0.85);line-height:1.6;margin:12px 0 10px}
.p-why strong{color:var(--blue);font-weight:700}
.p-steps{list-style:none}
.p-steps li{display:flex;gap:10px;font-size:10px;line-height:1.6;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text)}
.p-steps li:last-child{border-bottom:none}
.p-sn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0;width:13px;margin-top:1px}
.p-btns{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
.tbtn{display:inline-flex;align-items:center;gap:5px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,184,255,0.2);border-radius:7px;padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.dbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card2);color:var(--muted);border:1px solid var(--border2);border-radius:7px;padding:6px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.dbtn.is-done{background:var(--green-dim);color:var(--green);border-color:rgba(74,170,106,0.35)}

/* RESUMEN */
.res-header{margin-bottom:18px}
.res-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:1.5px;margin-bottom:3px;color:var(--text)}
.res-sub{font-size:11px;color:var(--muted)}
.today-box{background:var(--card);border:1px solid rgba(232,184,75,0.22);border-radius:13px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.today-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),rgba(245,208,128,0.3))}
.today-box-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:14px}
.today-pct-row{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.today-pct-num{font-family:'Barlow Condensed',sans-serif;font-size:58px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px}
.today-pct-info{flex:1}
.today-pct-label{font-size:13px;color:var(--text);font-weight:600;margin-bottom:5px}
.today-pct-sub{font-size:10px;color:var(--muted);line-height:1.6}
.today-prog{height:3px;background:var(--card3);border-radius:2px;overflow:hidden}
.today-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 0.5s ease}
.export-btn{width:100%;padding:15px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080c10;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s}
.export-btn:active{opacity:0.82}
.export-note{font-size:10px;color:var(--muted);text-align:center;margin-bottom:20px}

/* WEEK NAVIGATOR */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 14px}
.week-nav-btn{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:14px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.week-nav-btn:hover{color:var(--gold);border-color:rgba(232,184,75,0.4)}
.week-nav-btn:disabled{opacity:0.3;cursor:default}
.week-nav-btn:disabled:hover{color:var(--muted);border-color:var(--border2)}
.week-nav-center{text-align:center;flex:1}
.week-nav-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.week-nav-sub{font-size:9px;color:var(--muted);margin-top:1px}
.week-nav-today{font-size:9px;font-weight:700;color:var(--gold);cursor:pointer;padding:3px 9px;border:1px solid rgba(232,184,75,0.3);border-radius:10px;background:var(--gold-dim);margin-top:4px;display:inline-block}

.week-strip-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 0 8px;gap:8px}
.week-strip-btn{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:16px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:'DM Sans',sans-serif;flex-shrink:0;line-height:1}
.week-strip-btn:hover{color:var(--gold);border-color:rgba(232,184,75,0.4)}
.week-strip-label{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.week-strip-label span{font-size:9px;font-weight:500;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(232,184,75,0.25);border-radius:8px;padding:2px 7px;margin-left:7px;letter-spacing:1px;text-transform:uppercase;vertical-align:middle}
.week-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
.res-day-card{background:var(--card);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden;transition:border-color 0.2s}
.res-day-card.r-open{border-color:var(--border2)}
.res-day-card.is-today-card{border-color:rgba(74,184,255,0.25)}
.res-day-hdr{padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.res-day-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;min-width:34px;color:var(--muted)}
.res-day-num.is-today{color:var(--blue)}
.res-day-info{flex:1}
.res-day-name{font-size:13px;font-weight:600;margin-bottom:1px;color:var(--text)}
.res-day-sub{font-size:10px;color:var(--muted)}
.res-day-pct{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;flex-shrink:0}
.res-day-chev{color:var(--muted);font-size:10px;transition:transform 0.3s;flex-shrink:0}
.res-day-card.r-open .res-day-chev{transform:rotate(180deg)}
.res-day-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.res-day-card.r-open .res-day-body{max-height:500px}
.res-act-list{padding:4px 15px 13px;border-top:1px solid var(--border)}
.res-act{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}
.res-act:last-child{border-bottom:none}
.res-act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-mob{background:var(--blue)}
.dot-gym{background:var(--gold)}
.dot-run{background:var(--green)}
.dot-rest{background:var(--muted)}
.res-act-name{flex:1;color:var(--muted)}
.res-act-ok{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--green)}
.res-act-pend{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted2)}

/* TIMER */
.timer-ov{display:none;position:fixed;inset:0;background:rgba(8,12,16,0.97);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.timer-ov.show{display:flex}
.t-ring{width:190px;height:190px;position:relative;margin-bottom:18px}
.t-ring svg{transform:rotate(-90deg)}
.t-ring circle.bg{fill:none;stroke:var(--card2);stroke-width:5}
.t-ring circle.prog{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.9s linear}
.t-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.t-disp{font-family:'Barlow Condensed',sans-serif;font-size:50px;font-weight:900;color:var(--text);letter-spacing:-1px}
.t-lbl{font-size:11px;color:var(--muted);text-align:center;padding:0 32px;margin-bottom:28px;line-height:1.5}
.t-ctrl{display:flex;gap:10px}
.t-btn{padding:13px 28px;border-radius:11px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;border:none;cursor:pointer;transition:opacity 0.2s}
.t-btn.pri{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080c10}
.t-btn.sec{background:var(--card);color:var(--muted);border:1px solid var(--border2)}
.t-btn:active{opacity:0.8}

/* BOTTOM NAV */

function postSessKey(d){
  if([1,4].includes(d)) return 'A';
  if([2,5].includes(d)) return 'B';
  if([3,6].includes(d)) return 'C';
  return null;
}

// ── STORAGE: localStorage para persistencia real ──
let store = {};
try { store = JSON.parse(localStorage.getItem('rc_data') || '{}'); } catch(e){ store = {}; }
const saveStore = () => { try { localStorage.setItem('rc_data', JSON.stringify(store)); } catch(e){} };

function dateStr(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d2 = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${d2}`;
}

function getToday() { return new Date(); }

function getMondayOf(dt) {
  const d = new Date(dt);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function weekDays(mondayDt) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mondayDt);
    d.setDate(mondayDt.getDate() + i);
    return d;
  });
}

function gymKey(dt, name) { return dateStr(dt) + '_gym_' + name; }
function postKey(dt, id) { return dateStr(dt) + '_post_' + id; }
function mobKey(dt) { return dateStr(dt) + '_mob'; }

let curDayDate = (function(){
  const t = getToday();
  t.setHours(0,0,0,0);
  return t;
})();
let resWeekOffset = 0;

function gymPct(dt) {
  const d = dt.getDay();
  const data = GYM[d];
  if(!data) return 0;
  const all = data.sessions.flatMap(s=>s.ex);
  return all.length ? Math.round(all.filter(e=>store[gymKey(dt,e.n)]).length/all.length*100) : 0;
}
function postPct(dt) {
  const d = dt.getDay();
  const sk = postSessKey(d);
  if(!sk) return 0;
  const all = POST[sk].phases.flatMap(p=>p.ex);
  return all.length ? Math.round(all.filter(e=>store[postKey(dt,e.id)]).length/all.length*100) : 0;
}
function mobDone(dt) { return !!store[mobKey(dt)]; }
function totalPct(dt) {
  const d = dt.getDay();
  const gp = gymPct(dt);
  const pp = postPct(dt);
  if(!GYM[d]) return pp;
  return Math.round((gp+pp)/2);
}

function init() {
  applyGymEdits();
  const today = getToday();
  document.getElementById('todayDate').textContent = today.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  buildDays();
  renderDay(curDayDate);
}

function buildDays() {
  const cont = document.getElementById('daySelector');
  cont.innerHTML = '';
  const today = getToday();
  today.setHours(0,0,0,0);
  const todayStr = dateStr(today);
  const weekStart = getMondayOf(curDayDate);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);

  const lbl = document.getElementById('weekStripLabel');
  if(lbl) {
    const fmt = d => d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    const isCurrentWeek = dateStr(getMondayOf(today)) === dateStr(weekStart);
    lbl.innerHTML = fmt(weekStart) + ' — ' + fmt(weekEnd) + (isCurrentWeek ? '<span>Esta semana</span>' : '');
  }

  for(let i=0; i<7; i++) {
    const dt = new Date(weekStart);
    dt.setDate(weekStart.getDate() + i);
    const tp = totalPct(dt);
    const isActive = dateStr(dt) === dateStr(curDayDate);
    const isToday = dateStr(dt) === todayStr;
    const btn = document.createElement('div');
    let cls = 'day-btn';
    if(isActive) cls += ' active';
    if(tp > 0 && tp < 100) cls += ' has-dot';
    if(tp >= 100) cls += ' full-done';
    if(isToday) cls += ' today-mark';
    btn.className = cls;
    btn.dataset.date = dateStr(dt);
    btn.innerHTML = `<span class="dn">${DS[dt.getDay()]}</span><span class="dd">${dt.getDate()}</span><div class="day-dot"></div>`;
    btn.onclick = () => selDay(dt);
    cont.appendChild(btn);
  }
}

function changeMainWeek(delta) {
  const newDate = new Date(curDayDate);
  newDate.setDate(curDayDate.getDate() + delta * 7);
  curDayDate = newDate;
  buildDays();
  renderDay(curDayDate);
  if(document.getElementById('view-postura').classList.contains('active')) renderPostura(curDayDate);
  if(document.getElementById('view-resumen').classList.contains('active')) renderResumen();
}

function selDay(dt) {
  curDayDate = new Date(dt);
  buildDays();
  renderDay(curDayDate);
  if(document.getElementById('view-postura').classList.contains('active')) renderPostura(curDayDate);
  if(document.getElementById('view-resumen').classList.contains('active')) renderResumen();
}

function renderDay(dt) {
  const d = dt.getDay();
  const data = GYM[d];
  document.getElementById('dayBig').textContent = DN[d];
  document.getElementById('dayBg').textContent = DS[d].toUpperCase();
  document.getElementById('compRow').innerHTML = '';
  if(!data) {
    document.getElementById('dayLbl').textContent = 'Descanso';
    document.getElementById('daySub').textContent = 'Recuperación activa';
    document.getElementById('gymContent').innerHTML = `<div class="rest-card"><span class="rest-emoji">😴</span><div class="rest-title">DESCANSO TOTAL</div><div class="rest-txt">El músculo crece mientras descansás.<br>Hidratate · 8 horas de sueño · proteína.</div></div>`;
    return;
  }
  document.getElementById('dayLbl').textContent = data.label;
  document.getElementById('daySub').textContent = `${data.sessions.length} sesión${data.sessions.length>1?'es':''} · ⚡ Fuerza`;
  renderSessions(dt, data);
}

function renderComp(dt, data) {
  document.getElementById('compRow').innerHTML = '';
}

function toggleMob(dt) {
  const k = mobKey(dt);
  store[k] = !store[k];
  saveStore();
  renderComp(dt, GYM[dt.getDay()]);
  buildDays();
}

function renderSessions(dt, data) {
  const cont = document.getElementById('gymContent');
  cont.innerHTML = '';
  data.sessions.forEach((sess,si) => {
    const din = sess.ex.filter(e=>store[gymKey(dt,e.n)]).length;
    const pct = Math.round(din/sess.ex.length*100);
    const ok = din===sess.ex.length;
    const dtStr = dateStr(dt);
    const exHTML = sess.ex.map((ex,ei) => {
      const done = !!store[gymKey(dt,ex.n)];
      const safe = ex.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const dayDow = dt.getDay();
      return `<div class="ex-item${done?' done':''}" id="exi-${dtStr}-${si}-${ei}"><div class="ex-chk" onclick="toggleGym('${safe}','${dtStr}')">${done?'✓':''}</div><div class="ex-det" onclick="toggleGym('${safe}','${dtStr}')"><div class="ex-nm">${ex.n}</div><div class="ex-mt">${ex.m}</div>${ex.note?`<div class="ex-nt">${ex.note}</div>`:''}</div><span class="ex-tag tag-${ex.t}" onclick="toggleGym('${safe}','${dtStr}')">${TL[ex.t]||ex.t}</span><span class="ex-dots" onclick="openEdit(${dayDow},${si},${ei},event)" title="Editar">···</span></div>`;
    }).join('');
    const card = document.createElement('div');
    card.className = `session-card${si===0?' open':''}${ok?' all-done':''}`;
    card.id = 'sc'+si;
    card.style.animationDelay = (si*0.06)+'s';
    card.innerHTML = `<div class="sess-hdr" onclick="togSess(${si})"><div class="s-ico ${sess.ic}">${sess.icon}</div><div class="s-inf"><div class="s-type">${sess.type}</div><div class="s-name">${sess.name}</div></div><span class="s-badge${ok?' ok':''}">${ok?'✓ Listo':din+'/'+sess.ex.length}</span><span class="chevron">▼</span></div><div class="sess-body"><div class="pbar-wrap"><div class="pbar-lbl"><span>Progreso</span><span>${pct}%</span></div><div class="pbar"><div class="pbar-fill${ok?' gfill':''}" style="width:${pct}%"></div></div></div><div class="ex-list">${exHTML}</div></div>`;
    cont.appendChild(card);
  });
}

function togSess(i){document.getElementById('sc'+i).classList.toggle('open')}

function toggleGym(name, dtStr) {
  const [y,m,d2] = dtStr.split('-').map(Number);
  const dt = new Date(y,m-1,d2);
  const k = gymKey(dt, name);
  store[k] = !store[k];
  saveStore();
  renderSessions(dt, GYM[dt.getDay()]);
  renderComp(dt, GYM[dt.getDay()]);
  buildDays();
}

function renderPostura(dt) {
  const d = dt.getDay();
  const sk = postSessKey(d);
  const cont = document.getElementById('postContent');
  cont.innerHTML = '';
  if(!sk) {
    cont.innerHTML = `<div class="rest-card"><span class="rest-emoji">😴</span><div class="rest-title">DESCANSO TOTAL</div><div class="rest-txt">Recuperación activa recomendada.</div></div>`;
    return;
  }
  const sess = POST[sk];
  const dtStr = dateStr(dt);
  const hero = document.createElement('div');
  hero.className = 'post-hero';
  hero.innerHTML = `<div class="post-badge"><div class="pb-dot"></div><div class="pb-txt">SESIÓN ${sk}</div></div><div class="post-title">${sess.title}</div><div class="post-desc">${sess.desc}</div>`;
  cont.appendChild(hero);
  const pills = document.createElement('div');
  pills.className = 'phase-pills';
  sess.phases.forEach(ph => {
    const done = ph.ex.every(e=>store[postKey(dt,e.id)]);
    pills.innerHTML += `<div class="ph-pill${done?' done-ph':''}">${done?'✓ ':''}${ph.name}</div>`;
  });
  cont.appendChild(pills);
  sess.phases.forEach((ph,pi) => {
    const bt = document.createElement('div');
    bt.className = 'ph-block-title';
    bt.textContent = `${ph.name} — ${ph.sub}`;
    cont.appendChild(bt);
    ph.ex.forEach((ex,ei) => {
      const ok = !!store[postKey(dt,ex.id)];
      const card = document.createElement('div');
      card.className = `p-card${ok?' p-done':''}`;
      card.id = 'pe'+ex.id;
      card.style.animationDelay = (ei*0.04)+'s';
      const steps = ex.steps.map((s,i)=>`<li><span class="p-sn">${i+1}</span>${s}</li>`).join('');
      const safeN = ex.name.replace(/'/g,"\\'");
      const tb = ex.timer ? `<button class="tbtn" onclick="openTimer(${ex.timer},'${safeN}')">⏱ ${ex.timer}s</button>` : '';
      card.innerHTML = `<div class="p-hdr"><div class="p-chk" onclick="togglePost('${ex.id}','${dtStr}',event)">${ok?'✓':''}</div><div class="p-inf" onclick="togP('${ex.id}')"><div class="p-nm">${ex.name}</div><div class="p-pm">${ex.params}</div></div><span class="p-chev" onclick="togP('${ex.id}')">▼</span></div><div class="p-body"><div class="p-detail"><div class="p-why"><strong>¿Por qué?</strong> ${ex.why}</div><ul class="p-steps">${steps}</ul><div class="p-btns">${tb}<button class="dbtn${ok?' is-done':''}" onclick="togglePost('${ex.id}','${dtStr}',event)">${ok?'✓ Hecho':'Marcar hecho'}</button></div></div></div>`;
      cont.appendChild(card);
    });
  });
}

function togP(id){document.getElementById('pe'+id).classList.toggle('p-open')}

function togglePost(id, dtStr, ev) {
  if(ev) ev.stopPropagation();
  const [y,m,d2] = dtStr.split('-').map(Number);
  const dt = new Date(y,m-1,d2);
  const k = postKey(dt, id);
  store[k] = !store[k];
  saveStore();
  renderPostura(dt);
  buildDays();
}

function renderResumen() {
  const cont = document.getElementById('resContent');
  cont.innerHTML = '';

  const today = getToday();
  today.setHours(0,0,0,0);
  const todayStr = dateStr(today);

  const baseMon = getMondayOf(today);
  const weekMon = new Date(baseMon);
  weekMon.setDate(baseMon.getDate() + resWeekOffset * 7);
  const days = weekDays(weekMon);
  const weekSun = days[6];

  const fmt = (dt) => dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const weekRange = `${fmt(weekMon)} – ${fmt(weekSun)}`;
  const isCurrentWeek = resWeekOffset === 0;

  cont.innerHTML = `<div class="res-header"><div class="res-title">RESUMEN SEMANAL</div><div class="res-sub">Vista general · progreso y actividades</div></div>`;

  const sd = curDayDate;
  const sdStr = dateStr(sd);
  const gp = gymPct(sd), mok = mobDone(sd), pp = postPct(sd), tp = totalPct(sd);
  const tb = document.createElement('div');
  tb.className = 'today-box';
  const isRestDay = !GYM[sd.getDay()] && !postSessKey(sd.getDay());
  const dayLabel = sdStr === todayStr ? 'HOY · ' : '';
  if(isRestDay) {
    tb.innerHTML = `<div class="today-box-lbl">📅 ${dayLabel}${DN[sd.getDay()]}</div><div class="today-pct-row"><div class="today-pct-num" style="font-size:36px;color:var(--muted)">😴</div><div class="today-pct-info"><div class="today-pct-label" style="color:var(--muted)">Día de descanso</div><div class="today-pct-sub">Recuperación activa · hidratate bien</div></div></div>`;
  } else {
    tb.innerHTML = `<div class="today-box-lbl">📅 ${dayLabel}${DN[sd.getDay()]}</div><div class="today-pct-row"><div class="today-pct-num">${tp}%</div><div class="today-pct-info"><div class="today-pct-label">Completitud del día</div><div class="today-pct-sub">🏋️ Gym: ${gp}%<br>🧘 Movilidad: ${mok?'✓ listo':postSessKey(sd.getDay())?pp+'%':'sin sesión'}</div></div></div><div class="today-prog"><div class="today-prog-fill" style="width:${tp}%"></div></div>`;
  }
  cont.appendChild(tb);

  const expWrap = document.createElement('div');
  expWrap.innerHTML = `<button class="export-btn" onclick="exportExcel()">⬇️ &nbsp;DESCARGAR EXCEL SEMANAL</button><div class="export-note">Exporta el estado actual de todos los ejercicios de la semana</div>`;
  cont.appendChild(expWrap);

  const nav = document.createElement('div');
  nav.className = 'week-nav';
  nav.innerHTML = `
    <button class="week-nav-btn" onclick="changeWeek(-1)">◀</button>
    <div class="week-nav-center">
      <div class="week-nav-label">${weekRange}</div>
      ${!isCurrentWeek ? `<div><span class="week-nav-today" onclick="changeWeek(0)">IR A HOY</span></div>` : '<div style="font-size:9px;color:var(--gold);margin-top:3px;font-weight:700">SEMANA ACTUAL</div>'}
    </div>
    <button class="week-nav-btn" onclick="changeWeek(1)">▶</button>
  `;
  cont.appendChild(nav);

  const wl = document.createElement('div');
  wl.className = 'week-label';
  wl.textContent = 'ACTIVIDADES POR DÍA';
  cont.appendChild(wl);

  days.forEach((dt, i) => {
    const d = dt.getDay();
    const dtStr2 = dateStr(dt);
    const isFuture = dt > today;
    const isToday2 = dtStr2 === todayStr;
    const isCurDay = dtStr2 === sdStr;
    const data = GYM[d];
    const tp2 = isFuture ? 0 : totalPct(dt);
    const sk = postSessKey(d);
    const pctColor = tp2>=100?'var(--green)':tp2>0?'var(--gold)':'var(--muted)';

    let acts = [];
    if(sk) acts.push({type:'mob',name:`🧘 Movilidad Sesión ${sk} — ${POST[sk].title}`,done:!isFuture&&mobDone(dt)});
    if(data) {
      data.sessions.forEach(sess => {
        const dn = isFuture ? 0 : sess.ex.filter(e=>store[gymKey(dt,e.n)]).length;
        acts.push({type:sess.ic==='ic-run'?'run':'gym',name:`${sess.icon} ${sess.name}${isFuture?'':' ('+dn+'/'+sess.ex.length+')'}`,done:!isFuture&&dn===sess.ex.length});
      });
    } else {
      acts.push({type:'rest',name:'😴 Descanso total',done:true});
    }

    const actsHTML = acts.map(a=>`<div class="res-act"><div class="res-act-dot dot-${a.type}"></div><div class="res-act-name">${a.name}</div><div class="${a.done?'res-act-ok':'res-act-pend'}">${isFuture&&a.type!=='rest'?'—':a.done?'✓ hecho':'pendiente'}</div></div>`).join('');

    const card = document.createElement('div');
    let cardCls = 'res-day-card';
    if(isCurDay) cardCls += ' r-open';
    if(isToday2) cardCls += ' is-today-card';
    card.className = cardCls;
    card.id = 'rdd'+i;

    const todayBadge = isToday2 ? ' · <span style="color:var(--blue);font-size:9px;font-weight:700">HOY</span>' : '';
    card.innerHTML = `<div class="res-day-hdr" onclick="togR('rdd${i}')">
      <div class="res-day-num${isToday2?' is-today':''}">${dt.getDate()}</div>
      <div class="res-day-info">
        <div class="res-day-name">${DS[d]}${todayBadge}</div>
        <div class="res-day-sub">${data?data.label:'Descanso'}${isFuture?' · <span style="color:var(--muted2);font-size:9px">pendiente</span>':''}</div>
      </div>
      <div class="res-day-pct" style="color:${isFuture?'var(--muted2)':pctColor}">${isFuture?'—':tp2>0?tp2+'%':data?'—':'😴'}</div>
      <span class="res-day-chev">▼</span>
    </div>
    <div class="res-day-body"><div class="res-act-list">${actsHTML}</div></div>`;
    cont.appendChild(card);
  });
}

function changeWeek(delta) {
  if(delta === 0) {
    resWeekOffset = 0;
  } else {
    resWeekOffset += delta;
  }
  renderResumen();
}

function togR(id){document.getElementById(id).classList.toggle('r-open')}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  const today = getToday();
  const baseMon = getMondayOf(today);
  const weekMon = new Date(baseMon);
  weekMon.setDate(baseMon.getDate() + resWeekOffset * 7);
  const days = weekDays(weekMon);

  const s1 = [['DÍA','FECHA','MOVILIDAD','GYM %','TOTAL %','ESTADO']];
  days.forEach(dt => {
    s1.push([
      DN[dt.getDay()],
      dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
      mobDone(dt)?'✅ Completo':'⏳ Pendiente',
      GYM[dt.getDay()] ? gymPct(dt)+'%' : 'N/A',
      totalPct(dt)+'%',
      totalPct(dt)>=100?'✅ Completo':totalPct(dt)>0?'🔄 En progreso':'⏳ Sin iniciar'
    ]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:14},{wch:14},{wch:16},{wch:10},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen Semanal');

  const s2 = [['DÍA','FECHA','SESIÓN','EJERCICIO','SERIES/REPS','CATEGORÍA','ESTADO']];
  days.forEach(dt => {
    const data = GYM[dt.getDay()];
    if(!data) return;
    data.sessions.forEach(sess => {
      sess.ex.forEach(ex => {
        s2.push([
          DN[dt.getDay()],
          dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
          sess.name, ex.n, ex.m, TL[ex.t]||ex.t,
          store[gymKey(dt,ex.n)] ? '✅ Hecho' : '⏳ Pendiente'
        ]);
      });
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:12},{wch:14},{wch:22},{wch:32},{wch:18},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Gym Detallado');

  const s3 = [['SESIÓN','FECHA','FASE','EJERCICIO','PARÁMETROS','ESTADO']];
  days.forEach(dt => {
    const sk = postSessKey(dt.getDay());
    if(!sk) return;
    const sess = POST[sk];
    sess.phases.forEach(ph => {
      ph.ex.forEach(ex => {
        s3.push([
          sess.name+' — '+sess.title,
          dt.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}),
          ph.name, ex.name, ex.params,
          store[postKey(dt,ex.id)] ? '✅ Hecho' : '⏳ Pendiente'
        ]);
      });
    });
  });
  const ws3 = XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:28},{wch:14},{wch:16},{wch:32},{wch:22},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,'Movilidad Detallada');

  XLSX.writeFile(wb,'reestructuracion_semana_'+(resWeekOffset>=0?'+':'')+resWeekOffset+'_'+new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-')+'.xlsx');
}

let timerInterval=null,timerSecs=0,timerTotal=0,timerRunning=false;
function openTimer(s,l){
  timerSecs=s;timerTotal=s;timerRunning=false;clearInterval(timerInterval);
  document.getElementById('tDisp').textContent=fmt(s);
  document.getElementById('tLbl').textContent=l;
  document.getElementById('tToggle').textContent='INICIAR';
  updateRing(s,s);
  document.getElementById('timerOv').classList.add('show');
}
function updateRing(rem,total){
  const c=document.getElementById('tCircle');
  const circ=2*Math.PI*87;
  c.style.strokeDasharray=circ;
  c.style.strokeDashoffset=total>0?circ*(1-rem/total):0;
}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('tToggle').textContent='CONTINUAR';}
  else{timerRunning=true;document.getElementById('tToggle').textContent='PAUSAR';
    timerInterval=setInterval(()=>{timerSecs--;updateRing(Math.max(0,timerSecs),timerTotal);document.getElementById('tDisp').textContent=timerSecs>0?fmt(timerSecs):'¡LISTO!';if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('tToggle').textContent='REINICIAR';}},1000);}
}
function closeTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerOv').classList.remove('show')}
function fmt(s){const m=Math.floor(s/60);const sec=s%60;return m+':'+(sec<10?'0':'')+sec}

function sw(v){
  if(v==='postura') renderPostura(curDayDate);
  if(v==='resumen') renderResumen();
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
}

let editCtx = null;

let gymEdits = {};
try { gymEdits = JSON.parse(localStorage.getItem('rc_gym_edits') || '{}'); } catch(e){ gymEdits = {}; }
const saveEdits = () => { try { localStorage.setItem('rc_gym_edits', JSON.stringify(gymEdits)); } catch(e){} };

function editKey(dow, si, ei) { return `${dow}-${si}-${ei}`; }

function getEx(dow, si, ei) {
  const base = GYM[dow].sessions[si].ex[ei];
  const over = gymEdits[editKey(dow,si,ei)];
  return over ? {...base, ...over} : base;
}

function openEdit(dow, si, ei, e) {
  e.stopPropagation();
  editCtx = {dow, si, ei};
  const ex = getEx(dow, si, ei);
  document.getElementById('editName').value = ex.n;
  document.getElementById('editMeta').value = ex.m;
  document.getElementById('editNote').value = ex.note || '';
  document.getElementById('editOv').classList.add('show');
}

function closeEdit() {
  document.getElementById('editOv').classList.remove('show');
  editCtx = null;
}

function closeEditIfBg(e) {
  if(e.target === document.getElementById('editOv')) closeEdit();
}

function saveEdit() {
  if(!editCtx) return;
  const {dow, si, ei} = editCtx;
  const k = editKey(dow, si, ei);
  const newName = document.getElementById('editName').value.trim();
  const newMeta = document.getElementById('editMeta').value.trim();
  const newNote = document.getElementById('editNote').value.trim();
  if(!newName) return;
  gymEdits[k] = {n: newName, m: newMeta, note: newNote};
  saveEdits();
  const ex = GYM[dow].sessions[si].ex[ei];
  ex.n = newName; ex.m = newMeta; ex.note = newNote;
  closeEdit();
  renderSessions(curDayDate, GYM[curDayDate.getDay()]);
}

function applyGymEdits() {
  Object.entries(gymEdits).forEach(([k, over]) => {
    const [dow, si, ei] = k.split('-').map(Number);
    if(GYM[dow] && GYM[dow].sessions[si] && GYM[dow].sessions[si].ex[ei]) {
      Object.assign(GYM[dow].sessions[si].ex[ei], over);
    }
  });
}

init();
</script>
